<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control AWG</title>
    <style>
        body { 
            background-color: #121212; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center;
            margin-top: 20px;
            /* Evita que el celular intente hacer zoom o scroll al girar la perilla */
            touch-action: none; 
        }

        .panel { 
            background-color: #222; 
            border: 2px solid #444; 
            border-radius: 12px; 
            padding: 20px; 
            display: inline-block; 
            margin-bottom: 20px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.8), inset 0px 0px 8px rgba(0,255,0,0.1);
        }

        button { 
            background-color: #1a1a1a; 
            color: #00ff00; 
            border: 1px solid #00ff00; 
            font-size: 16px; 
            padding: 12px 20px; 
            margin: 8px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-family: inherit; 
            transition: all 0.2s; 
        }

        button:hover, button:active { 
            background-color: #00ff00; 
            color: #000; 
            box-shadow: 0px 0px 10px #00ff00; 
        }

        /* --- ESTILOS DE LA PERILLA DIGITAL --- */
        .marcador-frecuencia {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0px 0px 5px #00ff00;
        }

        .contenedor-perilla {
            width: 140px; 
            height: 140px;
            background-color: #111;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            border: 2px solid #333;
        }

        .perilla {
            width: 100%; 
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #444, #1a1a1a);
            cursor: grab;
            position: absolute;
            /* Ángulo inicial (-135 grados = equivalente a 1 Hz) */
            transform: rotate(-135deg); 
            box-shadow: inset 0px 0px 10px rgba(0,0,0,0.9);
        }

        .perilla:active {
            cursor: grabbing;
        }

        .indicador-perilla {
            width: 6px; 
            height: 25px;
            background-color: #00ff00;
            margin: 10px auto; /* Lo coloca en la parte superior central */
            border-radius: 3px;
            box-shadow: 0px 0px 8px #00ff00;
        }
    </style>
</head>
<body>
    <h2>GENERADOR DE FUNCIONES MCP4822</h2>
    
    <div class="panel">
        <h3>FORMA DE ONDA</h3>
        <button onclick="mandarComando('SENO')">SENOIDAL</button>
        <button onclick="mandarComando('CUADRADA')">CUADRADA</button>
        <button onclick="mandarComando('SIERRA')">DIENTE DE SIERRA</button>
    </div>
    
    <br>

    <div class="panel">
        <h3>FRECUENCIA</h3>
        <div class="marcador-frecuencia" id="pantalla-frecuencia">1 Hz</div>
        
        <div class="contenedor-perilla">
            <div class="perilla" id="miPerilla">
                <div class="indicador-perilla"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const perilla = document.getElementById('miPerilla');
        const pantalla = document.getElementById('pantalla-frecuencia');
        
        let estaArrastrando = false;
        let frecuenciaActual = 1;

        function mandarComando(orden) {
            socket.emit('comando_generador', orden);
        }

        // --- MATEMÁTICAS TRIGONOMÉTRICAS PARA ROTAR LA PERILLA ---
        function calcularGiro(e) {
            if (!estaArrastrando) return;

            // Obtenemos el centro exacto de la perilla en la pantalla
            const rect = perilla.getBoundingClientRect();
            const centroX = rect.left + rect.width / 2;
            const centroY = rect.top + rect.height / 2;
            
            // Detectar si es el ratón o el dedo en la pantalla táctil
            const clienteX = e.clientX || (e.touches && e.touches[0].clientX);
            const clienteY = e.clientY || (e.touches && e.touches[0].clientY);

            // Coordenadas relativas al centro
            const x = clienteX - centroX;
            const y = clienteY - centroY;
            
            // Calcular el ángulo en radianes y pasarlo a grados
            let radianes = Math.atan2(y, x);
            let grados = (radianes * 180) / Math.PI;
            
            // Ajustar el cero a la parte superior (en lugar de a la derecha)
            grados = grados + 90; 
            if (grados > 180) grados -= 360;

            // Limitar el giro mecánico (para que no dé la vuelta completa)
            // Límite izquierdo: -135°, Límite derecho: 135° (Rango total de 270°)
            if (grados < -135) grados = -135;
            if (grados > 135) grados = 135;

            // Aplicar la rotación visual en CSS
            perilla.style.transform = `rotate(${grados}deg)`;

            // Mapear los grados físicos (-135 a 135) a nuestra escala de Hertz (1 a 100)
            let porcentaje = (grados + 135) / 270; 
            frecuenciaActual = Math.round(porcentaje * 99) + 1;
            
            // Actualizar solo el texto verde (SIN ENVIAR A LA PICO AÚN)
            pantalla.innerText = frecuenciaActual + ' Hz';
        }

        // --- EVENTOS DEL RATÓN (COMPUTADORA) ---
        perilla.addEventListener('mousedown', () => estaArrastrando = true);
        document.addEventListener('mousemove', calcularGiro);
        document.addEventListener('mouseup', () => {
            if (estaArrastrando) {
                estaArrastrando = false;
                // ¡AQUÍ ENVIAMOS EL COMANDO! Solo cuando sueltas el click
                mandarComando('FREQ:' + frecuenciaActual);
            }
        });

        // --- EVENTOS TÁCTILES (CELULAR) ---
        perilla.addEventListener('touchstart', (e) => { 
            estaArrastrando = true; 
            calcularGiro(e); 
        }, {passive: false});
        
        document.addEventListener('touchmove', (e) => {
            if (estaArrastrando) {
                e.preventDefault(); // Evita que la pantalla se deslice mientras giras
                calcularGiro(e);
            }
        }, {passive: false});
        
        document.addEventListener('touchend', () => {
            if (estaArrastrando) {
                estaArrastrando = false;
                // ¡AQUÍ ENVIAMOS EL COMANDO! Solo cuando levantas el dedo
                mandarComando('FREQ:' + frecuenciaActual);
            }
        });
    </script>
</body>
</html>
