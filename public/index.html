<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Control AWG</title>
    <style>
        :root { --color-neon: #00ff00; --fondo-oscuro: #121212; --panel-bg: #1e1e1e; }
        body { background-color: var(--fondo-oscuro); color: var(--color-neon); font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 15px; touch-action: none; user-select: none; }
        
        .layout-principal { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        .panel { background-color: var(--panel-bg); border: 2px solid #333; border-radius: 12px; padding: 20px; box-sizing: border-box; }
        
        .led { width: 12px; height: 12px; border-radius: 50%; background: #ff3333; display: inline-block; transition: 0.3s; }
        .conectado { background: var(--color-neon); box-shadow: 0 0 10px var(--color-neon); }
        
        .grid-ondas { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-onda { width: 100%; padding: 15px; background: #1a1a1a; color: var(--color-neon); border: 2px solid #333; cursor: pointer; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-onda.activo { background: var(--color-neon); color: #000; border-color: var(--color-neon); }
        .btn-onda svg { width: 40px; height: 20px; stroke: var(--color-neon); fill: none; stroke-width: 3; }
        .btn-onda.activo svg { stroke: #000; }
        
        .marcador-frecuencia { font-size: 30px; margin: 20px 0; background: #000; padding: 10px; border: 1px inset #333; }
        .contenedor-perilla { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #222; margin: 0 auto 20px; position: relative; background: #111; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .perilla { width: 100%; height: 100%; border-radius: 50%; cursor: grab; background: radial-gradient(circle, #555, #111); transform: rotate(-135deg); position: absolute; z-index: 10; }
        .indicador-perilla { width: 6px; height: 30px; background-color: var(--color-neon); margin: 10px auto; border-radius: 3px; pointer-events: none; }
        
        .btn-accion { width: 100%; padding: 12px; margin-top: 10px; background: #1a1a1a; color: var(--color-neon); border: 1px solid var(--color-neon); cursor: pointer; font-weight: bold; }
        .btn-ancho { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>GENERADOR R2R</h2>
    <div style="margin-bottom: 15px;"><div id="led" class="led"></div> <span id="txt">Conectando...</span></div>
    
    <div class="layout-principal">
        <div class="panel">
            <h3>FORMA DE ONDA</h3>
            
            <button id="btn-salida" class="btn-accion btn-ancho" style="margin-top: 0; margin-bottom: 20px; font-size: 16px;" onclick="toggleSalida()">
                SALIDA: ACTIVADA
            </button>

            <div class="grid-ondas">
                <button class="btn-onda activo" onclick="cmd('SENO', this)">
                    <svg viewBox="0 0 100 30"><path d="M 0,15 Q 25,-10 50,15 T 100,15" /></svg>
                    SENOIDAL
                </button>
                <button class="btn-onda" onclick="cmd('CUADRADA', this)">
                    <svg viewBox="0 0 100 30"><path d="M 0,25 L 0,5 L 50,5 L 50,25 L 100,25" /></svg>
                    CUADRADA
                </button>
                <button class="btn-onda" onclick="cmd('SIERRA', this)">
                    <svg viewBox="0 0 100 30"><path d="M 0,25 L 50,5 L 50,25 L 100,5" /></svg>
                    SIERRA
                </button>
            </div>
        </div>
        
        <div class="panel">
            <h3>FRECUENCIA</h3>
            <div class="marcador-frecuencia" id="pantalla">60 Hz</div>
            <div class="contenedor-perilla"><div class="perilla" id="perilla"><div class="indicador-perilla"></div></div></div>
            <input type="number" id="manual" placeholder="Frecuencia (Hz)" style="width:90%; padding:10px; background:#000; color:#0f0; border:1px solid #333; margin-bottom: 10px;">
            <button class="btn-accion" onclick="fijar()">FIJAR</button>
            <button class="btn-accion" onclick="fijar(33250000)">MEDIA (33.25 MHz)</button>
            <button class="btn-accion" style="border-color:#f33; color:#f33" onclick="fijar(66500000)">MÁXIMA (66.5 MHz)</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); 
        let frec = 60; 
        let arrastrando = false;
        
        // --- VARIABLES DEL MUTE RECUPERADAS ---
        let salidaActivada = true;
        let ondaPrevia = 'SENO'; 

        socket.on('estado_pico', d => { 
            document.getElementById('led').className = d.conectada ? 'led conectado' : 'led'; 
            document.getElementById('txt').innerText = d.conectada ? 'Conectado' : 'Desconectado'; 
        });
        
        // --- LÓGICA DEL MUTE RECUPERADA ---
        function toggleSalida() {
            salidaActivada = !salidaActivada;
            const btnSalida = document.getElementById('btn-salida');
            
            if (salidaActivada) {
                btnSalida.innerText = 'SALIDA: ACTIVADA';
                btnSalida.style.borderColor = 'var(--color-neon)';
                btnSalida.style.color = 'var(--color-neon)';
                socket.emit('comando_generador', ondaPrevia); // Restaura la onda que tenías
            } else {
                btnSalida.innerText = 'SALIDA: SILENCIADA (MUTE)';
                btnSalida.style.borderColor = '#ff3333';
                btnSalida.style.color = '#ff3333';
                socket.emit('comando_generador', 'APAGAR'); // Manda a 0V
            }
        }

        // --- SELECCIÓN DE ONDA CONECTADA AL MUTE ---
        function cmd(o, el) { 
            ondaPrevia = o; // Guardamos en memoria qué onda tocaste
            
            if (!salidaActivada) {
                toggleSalida(); // Si estaba en MUTE y tocas una onda, lo desmutea automático
            } else {
                socket.emit('comando_generador', o);
            }

            if(el) { 
                document.querySelectorAll('.btn-onda').forEach(b=>b.classList.remove('activo')); 
                el.classList.add('activo'); 
            }
        }
        
        function fijar(f) { 
            frec = f || parseInt(document.getElementById('manual').value); 
            document.getElementById('pantalla').innerText = frec.toLocaleString() + ' Hz'; 
            socket.emit('comando_generador', 'FREQ:' + frec); 
        }

        // --- LÓGICA TÁCTIL (CORREGIDA Y MANTENIDA) ---
        const perilla = document.getElementById('perilla');
        const mover = (e) => {
            if(!arrastrando) return;
            e.preventDefault(); // Evita scroll en la tablet
            const rect = perilla.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const x = clientX - (rect.left + rect.width/2);
            const y = clientY - (rect.top + rect.height/2);
            let grad = (Math.atan2(y, x) * 180 / Math.PI) + 90;
            if(grad > 135) grad = 135; if(grad < -135) grad = -135;
            perilla.style.transform = `rotate(${grad}deg)`;
            frec = Math.round(((grad + 135)/270) * 66499999) + 1;
            document.getElementById('pantalla').innerText = frec.toLocaleString() + ' Hz';
        };

        const fin = () => { 
            if(arrastrando) { 
                arrastrando = false; 
                socket.emit('comando_generador', 'FREQ:' + frec); 
            } 
        };

        perilla.addEventListener('mousedown', () => arrastrando = true);
        perilla.addEventListener('touchstart', (e) => { arrastrando = true; mover(e); }, {passive: false});
        
        document.addEventListener('mousemove', mover);
        document.addEventListener('touchmove', mover, {passive: false});
        
        document.addEventListener('mouseup', fin);
        document.addEventListener('touchend', fin);
    </script>
</body>
</html>
